server:
  port: 8090

spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:ingestion}
    username: ${POSTGRES_USER:ingestion}
    password: ${POSTGRES_PASSWORD:ingestion}

management:
  endpoints:
    web:
      exposure:
        include: health,info